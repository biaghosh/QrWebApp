<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    #reader { width: 300px; margin: auto; }
    #status { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>

<h1>QR Code Scanner</h1>
<p>Scan QR → auto-save → continue scanning</p>

<div id="reader"></div>
<div id="status">Waiting for scan...</div>

<script>
let lastScan = null;

function parseQRData(qrText) {
  try {
    // Decode URL encoding
    let decoded = decodeURIComponent(qrText);

    // Remove leading ? if present
    if (decoded.startsWith("?")) {
      decoded = decoded.substring(1);
    }

    const params = new URLSearchParams(decoded);

    const fname = params.get("fname") || "";
    const lname = params.get("lname") || "";
    const cname = params.get("cname") || "";

    const name = (fname + " " + lname).trim();

    return { name, company: cname };
  } catch (err) {
    console.error("Parsing error:", err);
    return null;
  }
}

function onScanSuccess(decodedText) {
  if (decodedText === lastScan) return;
  lastScan = decodedText;

  document.getElementById("status").innerText = "Processing...";

  const parsed = parseQRData(decodedText);

  if (!parsed || !parsed.name) {
    document.getElementById("status").innerText = "❌ Invalid QR format";
    return;
  }

  const { name, company } = parsed;

  // Send to Google Sheet
  fetch("https://script.google.com/macros/s/AKfycbxoKVWgxOvt6N73Aeq752LQZbYLjUwPZ1dBi-sPZhHBgX-PtuCKBaafCzem8tAmyC1ENg/exec?name=" 
        + encodeURIComponent(name) 
        + "&company=" + encodeURIComponent(company))
    .then(() => {
      document.getElementById("status").innerText = "✅ Saved: " + name;

      // Reset after short delay for next scan
      setTimeout(() => {
        document.getElementById("status").innerText = "Waiting for scan...";
        lastScan = null;
      }, 1500);
    })
    .catch(err => {
      console.error(err);
      document.getElementById("status").innerText = "❌ Error saving";
    });
}

var html5QrcodeScanner = new Html5QrcodeScanner(
  "reader",
  { fps: 10, qrbox: 250 },
  false
);

html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
