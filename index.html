<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Scanner - BioInVision</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom right, #0f2027, #203a43, #2c5364);
    color: #fff;
    text-align: center;
    padding: 40px 20px;
  }
  .btn {
    padding: 20px 40px;
    font-size: 1.5em;
    border-radius: 12px;
    background: #00c6ff;
    border: none;
    margin-top: 30px;
  }
  #reader {
    width: 320px;
    margin: 20px auto;
    border: 2px solid #fff;
    border-radius: 12px;
  }
  #formBox {
    display: none;
    margin-top: 20px;
  }
  #imagePreview img {
    width: 220px;
    border-radius: 12px;
    margin-bottom: 15px;
    border: 2px solid #fff;
  }
  input, textarea {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
  }
  button {
    padding: 12px 20px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: #00c6ff;
  }
  #homePage, #scanPage {
    display: none;
  }
</style>
</head>
<body>
<div id="homePage">
  <h1>QR Scanner</h1>
  <button class="btn" onclick="startScan()">Scan (Live Camera)</button>
  <button class="btn" onclick="capturePhoto()">📸 Capture Badge</button>
</div>

<div id="scanPage">
  <h2>Scanning...</h2>
  <div id="reader"></div>
  
  <div id="formBox">
    <div id="imagePreview"></div>
    <div id="infoText"></div>
    
    <!-- NEW: All fields are now editable -->
    <input type="text" id="nameInput" placeholder="Full Name">
    <input type="text" id="companyInput" placeholder="Company Name">
    <input type="email" id="emailInput" placeholder="Email">
    <textarea id="notesInput" placeholder="Notes" rows="3"></textarea>
    
    <br>
    <button onclick="addToSheet()">Add to Google Sheet</button>
    <button onclick="backToHome()">Cancel</button>
  </div>
</div>

<script>
let lastScan = null;
let currentData = null;
let html5QrcodeScanner = null;

// ---------- NAVIGATION ----------
function showHome() {
  document.getElementById("homePage").style.display = "block";
  document.getElementById("scanPage").style.display = "none";
}

function startScan() {
  document.getElementById("homePage").style.display = "none";
  document.getElementById("scanPage").style.display = "block";
  lastScan = null;
  currentData = null;
  if (!html5QrcodeScanner) {
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }, false);
  }
  html5QrcodeScanner.render(onScanSuccess);
}

// ---------- IMAGE COMPRESSION ----------
function resizeAndCompressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => img.src = e.target.result;
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const MAX_WIDTH = 1200; // increased for better QR detection
      let width = img.width;
      let height = img.height;
      if (width > MAX_WIDTH) {
        const scale = MAX_WIDTH / width;
        width = MAX_WIDTH;
        height *= scale;
      }
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.85); // better quality
      resolve({
        base64: dataUrl.split(",")[1],
        blob: dataURLtoBlob(dataUrl)
      });
    };
    reader.readAsDataURL(file);
  });
}

function dataURLtoBlob(dataURL) {
  const arr = dataURL.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  const u8arr = new Uint8Array(bstr.length);
  for (let i = 0; i < bstr.length; i++) {
    u8arr[i] = bstr.charCodeAt(i);
  }
  return new Blob([u8arr], { type: mime });
}

// ---------- CAPTURE PHOTO ----------
async function capturePhoto() {
  document.getElementById("homePage").style.display = "none";
  document.getElementById("scanPage").style.display = "block";

  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";
  input.onchange = async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const processed = await resizeAndCompressImage(file);
    const base64 = processed.base64;

    const html5Qr = new Html5Qrcode("reader");
    let completed = false;

    const timeout = setTimeout(() => {
      if (!completed) {
        currentData = { name: "", company: "", image: base64 };
        showForm(false);
      }
    }, 3000); // longer timeout

    try {
      const result = await html5Qr.scanFile(
        new File([processed.blob], "resized.jpg", { type: "image/jpeg" }),
        true
      );
      completed = true;
      clearTimeout(timeout);
      const parsed = parseQRData(result);
      currentData = parsed || { name: "", company: "" };
      currentData.image = base64;
      showForm(parsed !== null);
    } catch (err) {
      completed = true;
      clearTimeout(timeout);
      currentData = { name: "", company: "", image: base64 };
      showForm(false);
    }
  };
  input.click();
}

// ---------- QR PARSE ----------
function parseQRData(qrText) {
  const parts = qrText.trim().split("$");
  if (parts.length < 5) return null;
  return {
    name: parts[2] + " " + parts[3],
    company: parts[4]
  };
}

// ---------- LIVE SCAN ----------
function onScanSuccess(decodedText) {
  if (decodedText === lastScan) return;
  lastScan = decodedText;
  const parsed = parseQRData(decodedText);
  currentData = parsed || { name: "", company: "" };
  showForm(parsed !== null);
}

// ---------- FORM ----------
function showForm(success) {
  if (html5QrcodeScanner) {
    try { html5QrcodeScanner.clear(); } catch {}
  }

  const form = document.getElementById("formBox");
  const info = document.getElementById("infoText");
  const preview = document.getElementById("imagePreview");

  form.style.display = "block";

  // Show badge photo if captured
  if (currentData.image) {
    preview.innerHTML = `<img src="data:image/jpeg;base64,${currentData.image}" />`;
  } else {
    preview.innerHTML = "";
  }

  // Info message
  if (success) {
    info.innerHTML = `<b>✅ QR Scanned:</b><br>${currentData.name}<br>${currentData.company}`;
  } else {
    info.innerHTML = `<b>📸 Scan failed or manual entry</b><br>Type the details below.<br>Badge photo is shown above.`;
  }

  // Prefill / clear all fields
  document.getElementById("nameInput").value = currentData.name || "";
  document.getElementById("companyInput").value = currentData.company || "";
  document.getElementById("emailInput").value = "";
  document.getElementById("notesInput").value = "";
}

// ---------- SAVE ----------
async function addToSheet() {
  const name    = document.getElementById("nameInput").value.trim() || "";
  const company = document.getElementById("companyInput").value.trim() || "";
  const email   = document.getElementById("emailInput").value.trim() || "";
  const notes   = document.getElementById("notesInput").value.trim() || "";

  // Build form data
  const formData = new URLSearchParams();
  formData.append("name", name);
  formData.append("company", company);
  formData.append("email", email);
  formData.append("notes", notes);
  formData.append("image", currentData ? (currentData.image || "") : "");

  try {
    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbxoKVWgxOvt6N73Aeq752LQZbYLjUwPZ1dBi-sPZhHBgX-PtuCKBaafCzem8tAmyC1ENg/exec",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: formData
      }
    );

    if (!response.ok) {
      throw new Error("Network response was not ok");
    }

    alert("✅ Saved to Google Sheet!");
    backToHome();
  } catch (err) {
    console.error("Save error:", err);
    alert("❌ Failed to save. Check console (F12) and try again.");
  }
}

function backToHome() {
  document.getElementById("formBox").style.display = "none";
  showHome();
}

// ---------- INIT ----------
showHome();
</script>
</body>
</html>
