<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    #reader { width: 300px; margin: auto; }
  </style>
</head>
<body>

<h1>QR Code Scanner</h1>
<p>Scan a QR code to capture name and email.</p>

<div id="reader"></div>

<script>
function onScanSuccess(decodedText, decodedResult) {
  console.log(`QR Code scanned: ${decodedText}`);
  
  // Assume QR code format: "Name,Email"
  const [name, email] = decodedText.split(",");

  // Send to Google Sheet
  fetch("https://script.google.com/macros/s/AKfycbxoKVWgxOvt6N73Aeq752LQZbYLjUwPZ1dBi-sPZhHBgX-PtuCKBaafCzem8tAmyC1ENg/exec?name=" + encodeURIComponent(name) + "&email=" + encodeURIComponent(email))
    .then(response => response.text())
    .then(data => alert("Saved to Google Sheet: " + data))
    .catch(err => alert("Error saving: " + err));
}

var html5QrcodeScanner = new Html5QrcodeScanner(
  "reader", { fps: 10, qrbox: 250 });
html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
