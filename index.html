<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Scanner - BioInVision DEBUG</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    /* ... (Keeping your original space-age CSS) ... */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f2027; color: #fff; text-align: center; padding: 20px; }
    .btn { display: block; width: 100%; max-width: 300px; padding: 15px; margin: 10px auto; border-radius: 10px; border: none; background: #00c6ff; color: white; font-weight: bold; }
    #reader { width: 100%; max-width: 340px; margin: auto; border: 2px solid #00c6ff; }
    input, textarea { width: 100%; max-width: 300px; margin: 10px auto; padding: 10px; display: block; }
    #loadingOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99; flex-direction:column; justify-content:center; }
  </style>
</head>
<body>

<div id="loadingOverlay"><h2>Sending...</h2></div>

<div id="homePage">
  <h1>QR Scanner</h1>
  <input type="text" id="uploaderName" placeholder="Your Name">
  <button class="btn" onclick="startScan()">1. Start Scan</button>
</div>

<div id="scanPage" style="display:none;">
  <div id="reader"></div>
  <div id="formBox" style="display:none; background: rgba(255,255,255,0.1); padding: 15px; margin-top: 10px;">
    <div id="imagePreview"></div>
    <button id="removeBtn" class="btn" style="background:red; display:none;" onclick="removePhoto()">Remove Photo</button>
    
    <input type="text" id="nameInput" placeholder="Name">
    <input type="text" id="companyInput" placeholder="Company">
    <input type="email" id="emailInput" placeholder="Email">
    <textarea id="notesInput" placeholder="Notes"></textarea>
    
    <button id="photoBtn" class="btn" style="background:#2c5364;" onclick="capturePhoto()">2. Take Photo</button>
    <button class="btn" onclick="addToSheet()">3. Upload Everything</button>
    <button class="btn" style="background:gray;" onclick="location.reload()">Cancel/Reset</button>
  </div>
</div>

<script>
let currentImageBase64 = "";
let html5QrcodeScanner = null;
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdI40K5f6vrN7vZ1i6TRysGQgUGV0SDmmkX64HqGJfrBytEUPf6zSlTwHFwawdzoCK_A/exec"; 

function startScan() {
  const uploader = document.getElementById('uploaderName').value;
  if (!uploader) { alert("Debug: Name missing"); return; }
  
  // CACHE WIPE
  currentImageBase64 = "";
  document.getElementById("nameInput").value = "";
  document.getElementById("companyInput").value = "";
  document.getElementById("emailInput").value = "";
  document.getElementById("notesInput").value = "";
  document.getElementById("imagePreview").innerHTML = "";

  document.getElementById("homePage").style.display = "none";
  document.getElementById("scanPage").style.display = "block";
  
  alert("Debug: Scanner initializing...");
  if (!html5QrcodeScanner) {
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
  }
  html5QrcodeScanner.render(onScanSuccess);
}

function onScanSuccess(text) {
  alert("Debug: QR Found -> " + text);
  const p = text.split("$");
  if (p.length >= 5) {
    document.getElementById("nameInput").value = p[2] + " " + p[3];
    document.getElementById("companyInput").value = p[4];
  }
  if (html5QrcodeScanner) html5QrcodeScanner.clear();
  document.getElementById("formBox").style.display = "block";
}

function capturePhoto() {
  alert("Debug: Opening Camera...");
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = event => {
      const img = new Image();
      img.onload = () => {
        alert("Debug: Image loaded. Resizing...");
        const canvas = document.createElement("canvas");
        const MAX = 800;
        let scale = MAX / img.width;
        canvas.width = MAX; canvas.height = img.height * scale;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        
        const dataUrl = canvas.toDataURL("image/jpeg", 0.5);
        currentImageBase64 = dataUrl.split(",")[1];
        
        document.getElementById("imagePreview").innerHTML = `<img src="${dataUrl}" style="width:100%"/>`;
        document.getElementById("photoBtn").style.display = "none";
        document.getElementById("removeBtn").style.display = "block";
        alert("Debug: Photo Ready (" + Math.round(currentImageBase64.length/1024) + "KB)");
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function removePhoto() {
  currentImageBase64 = "";
  document.getElementById("imagePreview").innerHTML = "";
  document.getElementById("removeBtn").style.display = "none";
  document.getElementById("photoBtn").style.display = "block";
}

function addToSheet() {
  alert("Debug: Starting Fetch to Google...");
  document.getElementById("loadingOverlay").style.display = "flex";

  const params = new URLSearchParams();
  params.append("name", document.getElementById("nameInput").value);
  params.append("company", document.getElementById("companyInput").value);
  params.append("email", document.getElementById("emailInput").value);
  params.append("notes", document.getElementById("notesInput").value);
  params.append("image", currentImageBase64);
  params.append("uploader", document.getElementById("uploaderName").value);

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: params
  })
  .then(() => {
    alert("Debug: Fetch finished (No-Cors mode). Check Sheet!");
    location.reload();
  })
  .catch(err => {
    alert("Debug: FETCH ERROR -> " + err.message);
    document.getElementById("loadingOverlay").style.display = "none";
  });
}
</script>
</body>
</html>
