<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Scanner - BioInVision</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <style>
    /* ... (Your original space-age CSS remains the same) ... */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(to bottom right, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
      text-align: center;
      overflow-x: hidden;
    }
    .btn { display: inline-block; width: 90%; max-width: 320px; padding: 18px 30px; font-size: 1.4em; font-weight: 600; border-radius: 16px; background: #00c6ff; color: #fff; border: none; margin: 15px auto; box-shadow: 0 4px 15px rgba(0, 198, 255, 0.3); transition: all 0.2s ease; }
    #reader { width: 100%; max-width: 340px; margin: 20px auto; border: 3px solid #00c6ff; border-radius: 16px; overflow: hidden; }
    #formBox { margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.08); border-radius: 16px; backdrop-filter: blur(10px); }
    #imagePreview img { width: 100%; max-width: 260px; border-radius: 16px; margin: 15px auto; border: 3px solid #fff; display: block; }
    input, textarea { width: 100%; max-width: 340px; padding: 14px 16px; margin: 10px auto; border-radius: 12px; border: none; font-size: 1.05em; background: rgba(255,255,255,0.95); color: #111; display: block; }
    
    /* DEBUG POPUP STYLING */
    #loadingOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center;
    }
    #debugLog {
      width: 80%; max-width: 300px; background: #000; color: #0f0; font-family: monospace; 
      font-size: 10px; padding: 10px; margin-top: 20px; border-radius: 8px; text-align: left;
      height: 120px; overflow-y: auto; border: 1px solid #333;
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <h2 id="statusTitle">Processing...</h2>
  <div id="debugLog"></div>
  <button id="closeDebug" style="display:none; margin-top:10px; padding:10px;" onclick="showHome()">Back to Home</button>
</div>

<div id="homePage">
  <h1>QR Scanner</h1>
  <input type="text" id="uploaderName" placeholder="Your Name (Saved)">
  <button class="btn" onclick="startScan()">Scan a QR Code</button>
</div>

<div id="scanPage" style="display:none;">
  <h2>Scanning...</h2>
  <div id="reader"></div>
  
  <div id="formBox" style="display:none;">
    <div id="imagePreview"></div>
    
    <div id="photoControls" style="display:none;">
      <button class="btn" style="background:#e74c3c; width:80%; font-size:1em; padding:10px;" onclick="removePhoto()">❌ Remove / Retake Photo</button>
    </div>

    <input type="text" id="nameInput" placeholder="Full Name">
    <input type="text" id="companyInput" placeholder="Company Name">
    <input type="email" id="emailInput" placeholder="Email">
    <textarea id="notesInput" placeholder="Notes" rows="3"></textarea>
    
    <button id="photoBtn" class="btn" style="background:#2c5364;" onclick="capturePhoto()">📸 Take Badge Photo</button>
    <button class="btn" onclick="addToSheet()">Add to Google Sheet</button>
    <button class="btn" style="background:gray;" onclick="backToHome()">Cancel</button>
  </div>
</div>

<script>
let currentData = { name: "", company: "", image: "" };
let html5QrcodeScanner = null;
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx6EFbsxDog_6sNoY2gKXJQAi06m1clO8Nj9eDIMxed3H_nTSWt2a5xxuvn9SP52LQl_g/exec"; 

window.onload = () => {
  const savedName = localStorage.getItem('uploaderName');
  if (savedName) document.getElementById('uploaderName').value = savedName;
};

function logDebug(msg) {
  const log = document.getElementById("debugLog");
  log.innerHTML += `> ${msg}<br>`;
  log.scrollTop = log.scrollHeight;
}

function resetForm() {
  logDebug("Resetting form data...");
  currentData.image = "";
  document.getElementById("nameInput").value = "";
  document.getElementById("companyInput").value = "";
  document.getElementById("emailInput").value = "";
  document.getElementById("notesInput").value = "";
  document.getElementById("imagePreview").innerHTML = "";
  document.getElementById("photoControls").style.display = "none";
  document.getElementById("photoBtn").style.display = "block";
}

function startScan() {
  const uploader = document.getElementById('uploaderName').value.trim();
  if (!uploader) { alert("Enter your name first."); return; }
  localStorage.setItem('uploaderName', uploader);
  
  resetForm(); // CLEAR PREVIOUS CACHE
  
  document.getElementById("homePage").style.display = "none";
  document.getElementById("scanPage").style.display = "block";
  
  if (!html5QrcodeScanner) {
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }, false);
  }
  html5QrcodeScanner.render(onScanSuccess);
}

function onScanSuccess(decodedText) {
  logDebug("QR Scanned successfully.");
  const parts = decodedText.trim().split("$");
  if (parts.length >= 5) {
    document.getElementById("nameInput").value = parts[2] + " " + parts[3];
    document.getElementById("companyInput").value = parts[4];
  }
  showForm();
}

async function capturePhoto() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    logDebug("Processing image...");
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX_WIDTH = 800; 
        let scale = MAX_WIDTH / img.width;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        const dataUrl = canvas.toDataURL("image/jpeg", 0.5);
        currentData.image = dataUrl.split(",")[1];
        
        logDebug(`Image ready: ~${Math.round(currentData.image.length/1024)}KB`);
        document.getElementById("imagePreview").innerHTML = `<img src="${dataUrl}" />`;
        document.getElementById("photoControls").style.display = "block";
        document.getElementById("photoBtn").style.display = "none";
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function removePhoto() {
  currentData.image = "";
  document.getElementById("imagePreview").innerHTML = "";
  document.getElementById("photoControls").style.display = "none";
  document.getElementById("photoBtn").style.display = "block";
  logDebug("Photo removed.");
}

function showForm() {
  if (html5QrcodeScanner) { try { html5QrcodeScanner.clear(); } catch {} }
  document.getElementById("formBox").style.display = "block";
}

function addToSheet() {
  const overlay = document.getElementById("loadingOverlay");
  overlay.style.display = "flex";
  document.getElementById("debugLog").innerHTML = "";
  logDebug("Starting upload...");

  const data = {
    name: document.getElementById("nameInput").value,
    company: document.getElementById("companyInput").value,
    email: document.getElementById("emailInput").value,
    notes: document.getElementById("notesInput").value,
    image: currentData.image || "",
    uploader: localStorage.getItem('uploaderName')
  };

  logDebug("Payload constructed. Sending fetch...");

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(() => {
    logDebug("Request sent (no-cors).");
    setTimeout(() => {
      overlay.style.display = "none";
      alert("Successfully Saved!");
      showHome();
    }, 1500);
  })
  .catch(err => {
    logDebug("FETCH ERROR: " + err.message);
    document.getElementById("statusTitle").innerText = "Upload Failed";
    document.getElementById("closeDebug").style.display = "block";
  });
}

function showHome() {
  document.getElementById("homePage").style.display = "block";
  document.getElementById("scanPage").style.display = "none";
  document.getElementById("loadingOverlay").style.display = "none";
}

function backToHome() { showHome(); }
showHome();
</script>
</body>
</html>
