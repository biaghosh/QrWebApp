<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    #reader { width: 300px; margin: auto; }
    #result { margin-top: 20px; font-weight: bold; color: green; }
  </style>
</head>
<body>

<h1>QR Code Scanner</h1>
<p>Scan a QR code to capture name and email.</p>

<div id="reader"></div>
<div id="result">Waiting for scan...</div>

<script>
let lastScan = null;

function onScanSuccess(decodedText, decodedResult) {
  // Prevent duplicate scans
  if (decodedText === lastScan) return;
  lastScan = decodedText;

  console.log("QR Code scanned:", decodedText);

  // Show scanned text on page
  document.getElementById("result").innerText = "Scanned: " + decodedText;

  // Extract Name and Email
  const parts = decodedText.split(",");
  if (parts.length < 2) {
    document.getElementById("result").innerText += " ❌ Invalid format";
    return;
  }

  const name = parts[0].trim();
  const email = parts[1].trim();

  // Send to Google Sheet
  fetch("https://script.google.com/macros/s/AKfycbxoKVWgxOvt6N73Aeq752LQZbYLjUwPZ1dBi-sPZhHBgX-PtuCKBaafCzem8tAmyC1ENg/exec?name=" 
        + encodeURIComponent(name) 
        + "&email=" + encodeURIComponent(email))
    .then(response => response.text())
    .then(data => {
      document.getElementById("result").innerText += " ✅ Saved";
    })
    .catch(err => {
      document.getElementById("result").innerText += " ❌ Error";
      console.error(err);
    });
}

var html5QrcodeScanner = new Html5QrcodeScanner(
  "reader",
  { fps: 10, qrbox: 250 },
  false // 🔥 disables verbose logs / default alerts
);

html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
