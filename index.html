<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Scanner - BioInVision</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    /* ... (Your existing styles remain the same) ... */
    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <h2>Uploading...</h2>
  <p>Please wait</p>
</div>

<div id="homePage">
  <h1>QR Scanner</h1>
  <button class="btn" onclick="startScan()">Scan a QR Code</button>
</div>

<div id="scanPage" style="display:none;">
  <h2>Scanning...</h2>
  <div id="reader"></div>
  
  <div id="formBox" style="display:none;">
    <div id="imagePreview"></div>
    <div id="infoText"></div>
    
    <input type="text" id="nameInput" placeholder="Full Name">
    <input type="text" id="companyInput" placeholder="Company Name">
    <input type="email" id="emailInput" placeholder="Email">
    <textarea id="notesInput" placeholder="Notes" rows="3"></textarea>
    
    <button class="btn" style="background:#444;" onclick="capturePhoto()">📸 Add Photo</button>
    <button onclick="addToSheet()">Add to Google Sheet</button>
    <button onclick="backToHome()">Cancel</button>
  </div>
</div>

<script>
let currentData = { name: "", company: "", image: "" };
let html5QrcodeScanner = null;
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw9iSvbc-vZUrLC8Snz_UAyMjuZDF-x1iGYdRJ8i7nHJxwU8zx3R34K5v9-gmPxYWtm5A/exec"; 

function showHome() {
  document.getElementById("homePage").style.display = "block";
  document.getElementById("scanPage").style.display = "none";
  document.getElementById("formBox").style.display = "none";
  if (html5QrcodeScanner) { try { html5QrcodeScanner.clear(); } catch {} }
}

function startScan() {
  document.getElementById("homePage").style.display = "none";
  document.getElementById("scanPage").style.display = "block";
  currentData = { name: "", company: "", image: "" };
  if (!html5QrcodeScanner) {
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }, false);
  }
  html5QrcodeScanner.render(onScanSuccess);
}

function onScanSuccess(decodedText) {
  const parsed = parseQRData(decodedText);
  currentData = parsed || { name: "", company: "" };
  showForm(parsed !== null);
}

function parseQRData(qrText) {
  const parts = qrText.trim().split("$");
  if (parts.length < 5) return null;
  return { name: parts[2] + " " + parts[3], company: parts[4] };
}

function resizeAndCompressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => img.src = e.target.result;
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      // Reduced to 800px for stability; 
      // still plenty for a badge photo in a spreadsheet
      const MAX_WIDTH = 800; 
      let width = img.width;
      let height = img.height;

      if (width > MAX_WIDTH) {
        const scale = MAX_WIDTH / width;
        width = MAX_WIDTH;
        height *= scale;
      }

      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);

      // Quality 0.6 is the "sweet spot" for small file size vs visibility
      const dataUrl = canvas.toDataURL("image/jpeg", 0.6); 
      resolve({
        base64: dataUrl.split(",")[1],
        preview: dataUrl
      });
    };
    reader.readAsDataURL(file);
  });
}

async function capturePhoto() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";
  input.onchange = async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    // Show a small loading hint if needed
    const previewDiv = document.getElementById("imagePreview");
    previewDiv.innerHTML = "<i>Processing photo...</i>";

    const processed = await resizeAndCompressImage(file);
    currentData.image = processed.base64;

    // Update the preview on the form
    previewDiv.innerHTML = `<img src="${processed.preview}" style="width:100px; height:auto; border-radius:8px;"/>`;
  };
  input.click();
}
function showForm(success) {
  if (html5QrcodeScanner) { try { html5QrcodeScanner.clear(); } catch {} }
  document.getElementById("formBox").style.display = "block";
  document.getElementById("infoText").innerHTML = success ? "<b>✅ Scanned Successfully</b>" : "<b>Manual Entry</b>";
  document.getElementById("nameInput").value = currentData.name || "";
  document.getElementById("companyInput").value = currentData.company || "";
}

function addToSheet() {
  const name = document.getElementById("nameInput").value.trim();
  const company = document.getElementById("companyInput").value.trim();
  
  if (!name && !company) {
    alert("Please enter a name or company.");
    return;
  }

  // Show a "Processing" overlay so the user doesn't click twice
  document.getElementById("loadingOverlay").style.display = "flex";

  const payload = {
    name: name,
    company: company,
    email: document.getElementById("emailInput").value.trim(),
    notes: document.getElementById("notesInput").value.trim(),
    image: currentData.image || ""
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors", 
    body: new URLSearchParams(payload)
  })
  .then(() => {
    document.getElementById("loadingOverlay").style.display = "none";
    alert("Successfully saved!");
    showHome(); // Returns to the start screen
  })
  .catch(err => {
    document.getElementById("loadingOverlay").style.display = "none";
    alert("Upload failed. Please try again.");
    console.error(err);
  });
}

function backToHome() { showHome(); }
showHome();
</script>
</body>
</html>
