<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Scanner - BioInVision</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <style>
    /* RESTORED ORIGINAL SPACE-AGE CSS */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(to bottom right, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
      text-align: center;
      overflow-x: hidden;
    }
    h1, h2 { margin-bottom: 20px; font-weight: 600; }
    .btn {
      display: inline-block;
      width: 90%;
      max-width: 320px;
      padding: 18px 30px;
      font-size: 1.4em;
      font-weight: 600;
      border-radius: 16px;
      background: #00c6ff;
      color: #fff;
      border: none;
      margin: 15px auto;
      box-shadow: 0 4px 15px rgba(0, 198, 255, 0.3);
      transition: all 0.2s ease;
    }
    .btn:active { transform: scale(0.95); background: #00a8d9; }
    #reader {
      width: 100%;
      max-width: 340px;
      margin: 20px auto;
      border: 3px solid #00c6ff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }
    #formBox {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    #imagePreview img {
      width: 100%;
      max-width: 260px;
      border-radius: 16px;
      margin: 15px auto;
      border: 3px solid #fff;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      display: block;
    }
    input, textarea {
      width: 100%;
      max-width: 340px;
      padding: 14px 16px;
      margin: 10px auto;
      border-radius: 12px;
      border: none;
      font-size: 1.05em;
      background: rgba(255,255,255,0.95);
      color: #111;
      display: block;
    }
    textarea { min-height: 90px; resize: vertical; }
    button {
      width: 100%;
      max-width: 320px;
      padding: 16px 20px;
      margin: 12px auto;
      border-radius: 14px;
      border: none;
      font-size: 1.15em;
      font-weight: 600;
      background: #00c6ff;
      color: white;
      box-shadow: 0 4px 12px rgba(0, 198, 255, 0.4);
    }
    button:active { background: #00a8d9; transform: scale(0.98); }
    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <h2>Processing...</h2>
  <p>Sending data to Google Sheets</p>
</div>

<div id="homePage">
  <h1>QR Scanner</h1>
  <input type="text" id="uploaderName" placeholder="Your Name (Saved for later)">
  <button class="btn" onclick="startScan()">Scan a QR Code</button>
</div>

<div id="scanPage" style="display:none;">
  <h2>Scanning...</h2>
  <div id="reader"></div>
  
  <div id="formBox" style="display:none;">
    <div id="imagePreview"></div>
    <div id="infoText"></div>
    
    <input type="text" id="nameInput" placeholder="Full Name">
    <input type="text" id="companyInput" placeholder="Company Name">
    <input type="email" id="emailInput" placeholder="Email">
    <textarea id="notesInput" placeholder="Notes" rows="3"></textarea>
    
    <button class="btn" style="background:#2c5364;" onclick="capturePhoto()">📸 Take Badge Photo</button>
    <button onclick="addToSheet()">Add to Google Sheet</button>
    <button onclick="backToHome()">Cancel</button>
  </div>
</div>

<script>
let currentData = { name: "", company: "", image: "" };
let html5QrcodeScanner = null;
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLzHMkgbwOFHLWXGyK8YRdJj0ZpJiSs59IlDvhKjZKLZm5u2Dqk0FTIntZjpUc5gjFgQ/exec"; 

// On Load: Check if uploader name is cached
window.onload = () => {
  const savedName = localStorage.getItem('uploaderName');
  if (savedName) document.getElementById('uploaderName').value = savedName;
};

function showHome() {
  document.getElementById("homePage").style.display = "block";
  document.getElementById("scanPage").style.display = "none";
  document.getElementById("formBox").style.display = "none";
  if (html5QrcodeScanner) { try { html5QrcodeScanner.clear(); } catch {} }
}

function startScan() {
  const uploader = document.getElementById('uploaderName').value.trim();
  if (!uploader) {
    alert("Please enter your name first.");
    return;
  }
  localStorage.setItem('uploaderName', uploader); // Cache it
  
  document.getElementById("homePage").style.display = "none";
  document.getElementById("scanPage").style.display = "block";
  currentData = { name: "", company: "", image: "" };
  
  if (!html5QrcodeScanner) {
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }, false);
  }
  html5QrcodeScanner.render(onScanSuccess);
}

function onScanSuccess(decodedText) {
  const parts = decodedText.trim().split("$");
  if (parts.length >= 5) {
    currentData.name = parts[2] + " " + parts[3];
    currentData.company = parts[4];
  }
  showForm();
}

async function capturePhoto() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX_WIDTH = 800;
        let scale = MAX_WIDTH / img.width;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        currentData.image = canvas.toDataURL("image/jpeg", 0.6).split(",")[1];
        document.getElementById("imagePreview").innerHTML = `<img src="data:image/jpeg;base64,${currentData.image}" />`;
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function showForm() {
  if (html5QrcodeScanner) { try { html5QrcodeScanner.clear(); } catch {} }
  document.getElementById("formBox").style.display = "block";
  document.getElementById("nameInput").value = currentData.name || "";
  document.getElementById("companyInput").value = currentData.company || "";
}

function addToSheet() {
  const name = document.getElementById("nameInput").value.trim();
  const company = document.getElementById("companyInput").value.trim();

  if (!name && !company) {
    alert("Please enter a name or company.");
    return;
  }

  document.getElementById("loadingOverlay").style.display = "flex";

  // Create a clean data object
  const data = {
    name: name,
    company: company,
    email: document.getElementById("emailInput").value.trim(),
    notes: document.getElementById("notesInput").value.trim(),
    image: currentData.image || "",
    uploader: localStorage.getItem('uploaderName') || "Unknown"
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors", 
    headers: {
      "Content-Type": "text/plain;charset=utf-8" // This avoids CORS 'preflight' checks
    },
    body: JSON.stringify(data)
  })
  .then(() => {
    // In no-cors mode, we just assume success after a short delay
    setTimeout(() => {
      document.getElementById("loadingOverlay").style.display = "none";
      alert("Saved Successfully!");
      showHome();
    }, 800);
  })
  .catch(err => {
    document.getElementById("loadingOverlay").style.display = "none";
    alert("Error saving data.");
    console.error(err);
  });
}

function backToHome() { showHome(); }
showHome();
</script>
</body>
</html>
