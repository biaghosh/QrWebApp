<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Scanner - BioInVision</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom right, #0f2027, #203a43, #2c5364);
    color: #fff;
    text-align: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  h1 {
    font-size: 2em;
    margin-bottom: 10px;
  }
  .btn {
    padding: 20px 40px;
    font-size: 1.5em;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #00c6ff;
    color: #000;
    transition: 0.3s;
    margin-top: 50px;
  }
  .btn:hover {
    background: #0072ff;
    color: #fff;
  }
  #reader {
    width: 320px;
    margin: 20px auto;
    border: 2px solid #fff;
    border-radius: 12px;
    padding: 10px;
    background-color: rgba(255,255,255,0.05);
  }
  #formBox {
    display: none;
    margin-top: 30px;
    background-color: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
  }
  input, textarea {
    padding: 12px;
    width: 90%;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 1em;
  }
  textarea {
    resize: vertical;
    height: 80px;
  }
  button {
    padding: 14px 30px;
    margin: 10px;
    font-size: 1.1em;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #00c6ff;
    color: #000;
    transition: 0.3s;
  }
  button:hover {
    background: #0072ff;
    color: #fff;
  }
  .infoText {
    font-size: 1.2em;
    margin-bottom: 15px;
  }
  #homePage, #scanPage {
    display: none;
  }
</style>
</head>
<body>

<div id="homePage">
  <h1>QR Scanner</h1>
  <p>Capture attendee info with a QR code scan.</p>
  <button class="btn" onclick="startScan()">Scan</button>
</div>

<div id="scanPage">
  <h1>Scanning...</h1>
  <div id="reader"></div>

  <div id="formBox">
    <div class="infoText" id="infoText"></div>
    <input type="email" id="emailInput" placeholder="Email (optional)">
    <textarea id="notesInput" placeholder="Notes (optional)"></textarea>
    <br>
    <button onclick="addToSheet()">Add to Google Sheet</button>
    <button onclick="backToHome()">Cancel</button>
  </div>
</div>

<script>
let lastScan = null;
let currentData = null;
let html5QrcodeScanner = null;

function showHome() {
  document.getElementById("homePage").style.display = "block";
  document.getElementById("scanPage").style.display = "none";
}

function startScan() {
  document.getElementById("homePage").style.display = "none";
  document.getElementById("scanPage").style.display = "block";

  lastScan = null;
  currentData = null;

  if (!html5QrcodeScanner) {
    html5QrcodeScanner = new Html5QrcodeScanner(
      "reader", { fps: 10, qrbox: 250 }, false
    );

    Html5Qrcode.getCameras().then(cameras => {
      if (cameras && cameras.length) {
        html5QrcodeScanner.render(onScanSuccess);
      } else {
        alert("No camera found or permission denied.");
      }
    }).catch(err => {
      alert("Camera access required.");
    });
  } else {
    html5QrcodeScanner.render(onScanSuccess);
  }
}

function parseQRData(qrText) {
  const parts = qrText.trim().split("$");
  if (parts.length < 5) return null;
  return {
    name: (parts[2] + " " + parts[3]).trim(),
    company: parts[4]
  };
}

function onScanSuccess(decodedText) {
  if (decodedText === lastScan) return;
  lastScan = decodedText;

  const parsed = parseQRData(decodedText);
  currentData = parsed || { name: "", company: "", email: "", notes: "" };
  showForm(parsed !== null);
}

function showForm(success) {
  html5QrcodeScanner.clear();
  const form = document.getElementById("formBox");
  const info = document.getElementById("infoText");
  form.style.display = "block";

  if (success) {
    info.innerHTML = `<b>${currentData.name}</b><br>Company: ${currentData.company}`;
    document.getElementById("emailInput").value = "";
    document.getElementById("notesInput").value = "";
  } else {
    info.innerHTML = "Scan failed. Enter details manually.";
    document.getElementById("emailInput").value = currentData.email || "";
    document.getElementById("notesInput").value = currentData.notes || "";
  }
}

function addToSheet() {
  const email = document.getElementById("emailInput").value || "";
  const notes = document.getElementById("notesInput").value || "";

  fetch("https://script.google.com/macros/s/AKfycbxt-VpLaLiOS6cxPl96GzvCQ3W5oKnWvd7NMwjqCvfJ7qukrO2EUJiaGqRVzcAYwaIPYQ/exec?name="
    + encodeURIComponent(currentData.name)
    + "&company=" + encodeURIComponent(currentData.company)
    + "&email=" + encodeURIComponent(email)
    + "&notes=" + encodeURIComponent(notes))
    .then(() => alert("Name Added"))
    .then(() => backToHome())
    .catch(err => alert("Error saving: " + err));
}

function backToHome() {
  document.getElementById("formBox").style.display = "none";
  showHome();
}

// Initial page
showHome();
</script>

</body>
</html>
